name: "🔥 Cache Warming"

on:
  workflow_dispatch:
    inputs:
      VARIANTS:
        description: "Variants to warm"
        type: choice
        default: "all"
        options:
          - "all"
          - "VANILLA"
          - "KSUNEXT-SUSFS"
          - "RESUKISU-SUSFS"
      ENABLE_LTO:
        description: "⚠️ Enable LTO"
        type: choice
        default: "NONE"
        options:
          - "NONE"
          - "THIN"

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: "🎯 Set Warming Matrix"
        id: set-matrix
        run: |
          if [ "${{ inputs.VARIANTS }}" = "all" ]; then
            echo 'matrix=["VANILLA","KSUNEXT-SUSFS","RESUKISU-SUSFS"]' >> $GITHUB_OUTPUT
          else
            echo "matrix=[\"${{ inputs.VARIANTS }}\"]" >> $GITHUB_OUTPUT
          fi

  warm:
    needs: setup
    name: "🔥 Warm ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    env:
      CCACHE_DIR:     ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: "5G"
      VARIANT:        ${{ matrix.variant }}

    steps:

      - name: "🌀 Clone Veilkernel-Arise"
        run: |
          git clone --depth=1 \
            "https://x-access-token:${{ secrets.PERSONAL_TOKEN }}@github.com/chainonyourdoor/Veilkernel-Arise" \
            .

      - name: "🧰 Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 12

      - name: "♻️ Restore arsenal cache"
        uses: actions/cache@v4
        with:
          path: |
            ~/ccache-bin
            ~/.apt-cache
            ~/clang-cache
            ~/ak3-cache
          key: arsenal-${{ github.run_id }}
          restore-keys: arsenal-

      - name: "♻️ Restore ccache data"
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-data-${{ matrix.variant }}-${{ inputs.ENABLE_LTO == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: ccache-data-${{ matrix.variant }}-${{ inputs.ENABLE_LTO == 'THIN' && 'lto-' || '' }}${{ github.ref_name }}-

      - name: "♻️ Restore kernel source cache"
        uses: actions/cache@v4
        with:
          path: ~/kernel-cache
          key: kernel-source-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: kernel-source-${{ github.ref_name }}-

      - name: "♻️ Restore KSU + SUSFS cache"
        if: matrix.variant != 'VANILLA'
        uses: actions/cache@v4
        with:
          path: |
            ~/ksu-cache
            ~/susfs-cache
          key: ksu-susfs-${{ matrix.variant }}-${{ github.run_id }}
          restore-keys: ksu-susfs-${{ matrix.variant }}-

      - name: "📦 Install Dependencies"
        run: |
          if [ -d ~/.apt-cache ]; then
            sudo cp -rn ~/.apt-cache/. /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev libelf-dev \
            dwarves cpio git curl wget zip patch rsync

      - name: "🔥 Warm ${{ matrix.variant }}"
        env:
          USE_CLANG_CACHE:  "true"
          USE_KERNEL_CACHE: "true"
          USE_AK3_CACHE:    "true"
          USE_KSU_CACHE:    "true"
          CCACHE_IS_KERNEL_COMPILING: "true"
          WARMING_MODE:     "true"
          ENABLE_LTO:       ${{ inputs.ENABLE_LTO }}
        run: bash build.sh

      - name: "📊 Ccache stats"
        id: stats
        if: always()
        run: |
          MISSES=0
          if [ -f "$HOME/ccache-bin/ccache" ]; then
            $HOME/ccache-bin/ccache --show-stats
            MISSES=$($HOME/ccache-bin/ccache --show-stats \
              | grep "Misses:" | awk '{sum+=$2} END{print sum+0}')
          fi
          echo "misses=${MISSES}" >> $GITHUB_OUTPUT

      - name: "🧹 Cleanup old caches"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          cleanup_cache() {
            local PREFIX="$1"
            local CURRENT_KEY="$2"
            local CACHES
            CACHES=$(gh api \
              "/repos/${{ github.repository }}/actions/caches?per_page=100" \
              --jq ".actions_caches[] | select(.key | startswith(\"${PREFIX}\")) | select(.key != \"${CURRENT_KEY}\") | .id")
            if [ -n "$CACHES" ]; then
              for ID in $CACHES; do
                gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
              done
            fi
          }

          LTO_PREFIX="${{ inputs.ENABLE_LTO == 'THIN' && 'lto-' || '' }}"

          cleanup_cache "arsenal-" "arsenal-${{ github.run_id }}"
          cleanup_cache "kernel-source-${{ github.ref_name }}-" "kernel-source-${{ github.ref_name }}-${{ github.run_id }}"
          cleanup_cache "ccache-data-${{ matrix.variant }}-${LTO_PREFIX}${{ github.ref_name }}-" \
            "ccache-data-${{ matrix.variant }}-${LTO_PREFIX}${{ github.ref_name }}-${{ github.run_id }}"
          if [[ "${{ matrix.variant }}" != "VANILLA" ]]; then
            cleanup_cache "ksu-susfs-${{ matrix.variant }}-" "ksu-susfs-${{ matrix.variant }}-${{ github.run_id }}"
          fi

      - name: "🔁 Re-trigger if not fully warmed"
        if: steps.stats.outputs.misses != '0'
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          gh workflow run warming.yml \
            -R chainonyourdoor/Arise-CI \
            --ref ${{ github.ref_name }} \
            --field VARIANTS=${{ matrix.variant }} \
            --field ENABLE_LTO=${{ inputs.ENABLE_LTO }}

      - name: "📣 Notify Telegram"
        if: steps.stats.outputs.misses == '0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_CACHE: ${{ secrets.TELEGRAM_THREAD_ID_CACHE }}
        run: |
          LTO_LABEL="None"
          [ "${{ inputs.ENABLE_LTO }}" = "THIN" ] && LTO_LABEL="Thin"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            ${TELEGRAM_THREAD_ID_CACHE:+-d message_thread_id="${TELEGRAM_THREAD_ID_CACHE}"} \
            -d text="🔥 Cache Fully Warmed 🔥%0A%0AVariant: ${{ matrix.variant }}%0ALTO: ${LTO_LABEL}%0AHit rate: 100%" \
            -d parse_mode="HTML"
