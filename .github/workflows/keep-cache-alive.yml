name: "🫀 Keep Cache Alive"

on:
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

jobs:

  keep-alive:
    name: "♻️ Touch ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [VANILLA, KSUNEXT-SUSFS, RESUKISU-SUSFS]
      fail-fast: false

    steps:

      - name: "♻️ Touch ccache data"
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-data-${{ matrix.variant }}-${{ github.ref_name }}-__keepalive__
          restore-keys: ccache-data-${{ matrix.variant }}-${{ github.ref_name }}-

  keep-alive-shared:
    name: "♻️ Touch shared caches"
    runs-on: ubuntu-latest

    steps:

      - name: "♻️ Touch ccache binary"
        uses: actions/cache/restore@v4
        with:
          path: ~/ccache-bin
          key: ccache-ecs-bin-__keepalive__
          restore-keys: ccache-ecs-bin-

      - name: "♻️ Touch apt cache"
        uses: actions/cache/restore@v4
        with:
          path: ~/.apt-cache
          key: apt-deps-ubuntu-24-__keepalive__
          restore-keys: apt-deps-ubuntu-24-

      - name: "♻️ Touch Clang cache"
        uses: actions/cache/restore@v4
        with:
          path: ~/clang-cache
          key: clang-greenforce-__keepalive__
          restore-keys: clang-greenforce-

      - name: "♻️ Touch kernel source cache"
        uses: actions/cache/restore@v4
        with:
          path: ~/kernel-cache
          key: kernel-source-${{ github.ref_name }}-__keepalive__
          restore-keys: kernel-source-${{ github.ref_name }}-

      - name: "♻️ Touch AnyKernel3 cache"
        uses: actions/cache/restore@v4
        with:
          path: ~/ak3-cache
          key: ak3-veilak3-__keepalive__
          restore-keys: ak3-veilak3-

      - name: "♻️ Touch KSU + SUSFS (KSUNEXT)"
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/ksu-cache
            ~/susfs-cache
          key: ksu-susfs-KSUNEXT-SUSFS-__keepalive__
          restore-keys: ksu-susfs-KSUNEXT-SUSFS-

      - name: "♻️ Touch KSU + SUSFS (RESUKISU)"
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/ksu-cache
            ~/susfs-cache
          key: ksu-susfs-RESUKISU-SUSFS-__keepalive__
          restore-keys: ksu-susfs-RESUKISU-SUSFS-
