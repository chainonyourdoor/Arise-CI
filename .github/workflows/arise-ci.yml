name: "⚡ Veilkernel-Arise"

on:
  workflow_dispatch:
    inputs:
      BUILD_VANILLA:
        description: "Vanilla"
        type: boolean
        default: false
      BUILD_KSUNEXT:
        description: "KSUNEXT-SUSFS"
        type: boolean
        default: false
      BUILD_RESUKISU:
        description: "RESUKISU-SUSFS"
        type: boolean
        default: false
      FORCE_UPDATE_INFRA:
        description: "Force Update (Clang, Kernel, AK3, APT)"
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"
      FORCE_UPDATE_KSU:
        description: "Force Update KSU + SUSFS sources"
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"
      ENABLE_LTO:
        description: "Enable Thin LTO — ⚠️ slow build time"
        type: choice
        default: "no"
        options:
          - "yes"
          - "no"

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: "🎯 Set Build Matrix"
        id: set-matrix
        run: |
          variants=()
          [[ "${{ inputs.BUILD_VANILLA }}"   == "true" ]] && variants+=("VANILLA")
          [[ "${{ inputs.BUILD_KSUNEXT }}"   == "true" ]] && variants+=("KSUNEXT-SUSFS")
          [[ "${{ inputs.BUILD_RESUKISU }}"  == "true" ]] && variants+=("RESUKISU-SUSFS")
          JSON=$(printf '%s\n' "${variants[@]}" | jq -R . | jq -sc .)
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  build:
    needs: setup
    if: needs.setup.outputs.matrix != '[]'
    name: "🔥 Build ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    env:
      PERSONAL_TOKEN:            ${{ secrets.PERSONAL_TOKEN }}
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_SEND_BUILD_CHAT_ID: ${{ secrets.TELEGRAM_SEND_BUILD_CHAT_ID }}
      TELEGRAM_SEND_LOG_CHAT_ID:   ${{ secrets.TELEGRAM_SEND_LOG_CHAT_ID }}
      TELEGRAM_THREAD_ID_BUILD:    ${{ secrets.TELEGRAM_THREAD_ID_BUILD }}
      TELEGRAM_THREAD_ID_LOG:      ${{ secrets.TELEGRAM_THREAD_ID_LOG }}
      VARIANT:          ${{ matrix.variant }}
      CCACHE_DIR:       ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE:   "5G"

    steps:

      - name: "🌀 Clone Veilkernel-Arise"
        run: |
          git clone --depth=1 \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/Veilkernel-Arise" \
            .

      - name: "🧰 Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 12

      - name: "♻️ Restore ccache binary"
        uses: actions/cache@v4
        with:
          path: ~/ccache-bin
          key: ccache-ecs-bin-v1
          restore-keys: ccache-ecs-bin-

      - name: "♻️ Restore ccache data"
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-data-${{ matrix.variant }}-${{ inputs.ENABLE_LTO == 'yes' && 'lto-' || '' }}${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: ccache-data-${{ matrix.variant }}-${{ inputs.ENABLE_LTO == 'yes' && 'lto-' || '' }}${{ github.ref_name }}-

      - name: "♻️ Restore apt cache"
        if: inputs.FORCE_UPDATE_INFRA != 'yes'
        uses: actions/cache@v4
        with:
          path: ~/.apt-cache
          key: apt-deps-ubuntu-24-v1
          restore-keys: apt-deps-ubuntu-24-

      - name: "♻️ Restore Clang cache"
        if: inputs.FORCE_UPDATE_INFRA != 'yes'
        uses: actions/cache@v4
        with:
          path: ~/clang-cache
          key: clang-greenforce-v1
          restore-keys: clang-greenforce-

      - name: "♻️ Restore kernel source cache"
        if: inputs.FORCE_UPDATE_INFRA != 'yes'
        uses: actions/cache@v4
        with:
          path: ~/kernel-cache
          key: kernel-source-${{ github.ref_name }}-v1
          restore-keys: kernel-source-${{ github.ref_name }}-

      - name: "♻️ Restore AnyKernel3 cache"
        if: inputs.FORCE_UPDATE_INFRA != 'yes'
        uses: actions/cache@v4
        with:
          path: ~/ak3-cache
          key: ak3-veilak3-v1
          restore-keys: ak3-veilak3-

      - name: "♻️ Restore KSU + SUSFS cache"
        if: |
          inputs.FORCE_UPDATE_KSU != 'yes' &&
          matrix.variant != 'VANILLA'
        uses: actions/cache@v4
        with:
          path: |
            ~/ksu-cache
            ~/susfs-cache
          key: ksu-susfs-${{ matrix.variant }}-v1
          restore-keys: ksu-susfs-${{ matrix.variant }}-

      - name: "📦 Install Dependencies"
        run: |
          if [ -d ~/.apt-cache ] && [ "${{ inputs.FORCE_UPDATE_INFRA }}" != "yes" ]; then
            sudo cp -rn ~/.apt-cache/. /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev libelf-dev \
            dwarves cpio git curl wget zip patch rsync
          mkdir -p ~/.apt-cache
          sudo cp /var/cache/apt/archives/*.deb ~/.apt-cache/ 2>/dev/null || true

      - name: "⚡ Build ${{ matrix.variant }}"
        env:
          GIT_CLONE_PROTECTION_ACTIVE: false
          USE_CLANG_CACHE:  ${{ inputs.FORCE_UPDATE_INFRA != 'yes' }}
          USE_KERNEL_CACHE: ${{ inputs.FORCE_UPDATE_INFRA != 'yes' }}
          USE_AK3_CACHE:    ${{ inputs.FORCE_UPDATE_INFRA != 'yes' }}
          USE_KSU_CACHE:    ${{ inputs.FORCE_UPDATE_KSU != 'yes' }}
          CCACHE_IS_KERNEL_COMPILING: "true"
          ENABLE_LTO:       ${{ inputs.ENABLE_LTO }}
        run: bash build.sh

      - name: "📊 Ccache stats"
        if: always()
        run: |
          [ -f "${GITHUB_WORKSPACE}/ccache-bin/ccache" ] && \
            ${GITHUB_WORKSPACE}/ccache-bin/ccache --show-stats || true

      - name: "🧹 Cleanup old ccache data"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          PREFIX="ccache-data-${{ matrix.variant }}-${{ inputs.ENABLE_LTO == 'yes' && 'lto-' || '' }}${{ github.ref_name }}-"
          CURRENT_KEY="${PREFIX}${{ github.run_id }}"
          CACHES=$(gh api \
            "/repos/${{ github.repository }}/actions/caches?per_page=100" \
            --jq ".actions_caches[] | select(.key | startswith(\"${PREFIX}\")) | select(.key != \"${CURRENT_KEY}\") | .id")
          if [ -n "$CACHES" ]; then
            for ID in $CACHES; do
              gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${ID}" || true
            done
          fi
