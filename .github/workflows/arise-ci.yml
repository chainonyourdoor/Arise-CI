name: "Veilkernel-Arise🔥"

on:
  workflow_dispatch:
    inputs:
      FORCE_UPDATE:
        description: "Force update all sources"
        type: boolean
        default: false
      BUILD_VANILLA:
        description: "Vanilla"
        type: boolean
        default: false
      BUILD_KSUNEXT:
        description: "KSUNEXT-SUSFS"
        type: boolean
        default: false
      BUILD_RESUKISU:
        description: "RESUKISU-SUSFS"
        type: boolean
        default: false

env:
  DEBIAN_FRONTEND: noninteractive

jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: "🎯 Set Build Matrix"
        id: set-matrix
        run: |
          variants=()
          [[ "${{ inputs.BUILD_VANILLA }}" == "true" ]] && variants+=("VANILLA")
          [[ "${{ inputs.BUILD_KSUNEXT }}" == "true" ]] && variants+=("KSUNEXT-SUSFS")
          [[ "${{ inputs.BUILD_RESUKISU }}" == "true" ]] && variants+=("RESUKISU-SUSFS")
          JSON=$(printf '%s\n' "${variants[@]}" | jq -R . | jq -sc .)
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  build:
    needs: setup
    if: needs.setup.outputs.matrix != '[]'
    name: "🛠️ Build [${{ matrix.variant }}]"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false

    env:
      PERSONAL_TOKEN:   ${{ secrets.PERSONAL_TOKEN }}
      TG_BOT_TOKEN:     ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID:       ${{ secrets.TG_CHAT_ID }}
      TG_LOG_BOT_TOKEN: ${{ secrets.TG_LOG_BOT_TOKEN }}
      TG_LOG_CHAT_ID:   ${{ secrets.TG_LOG_CHAT_ID }}
      VARIANT:          ${{ matrix.variant }}
      FORCE_UPDATE:     ${{ github.event.inputs.FORCE_UPDATE }}
      CCACHE_DIR:       ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE:   "5G"

    steps:

      - name: "📥 Clone Veilkernel-Arise"
        run: |
          git clone --depth=1 \
            "https://x-access-token:${PERSONAL_TOKEN}@github.com/chainonyourdoor/Veilkernel-Arise" \
            .

      - name: "💾 Setup Swap Space"
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 12

      - name: "♻️ Restore ccache binary"
        uses: actions/cache@v4
        with:
          path: ~/ccache-bin
          key: ccache-ecs-bin-${{ github.run_id }}
          restore-keys: ccache-ecs-bin-

      - name: "♻️ Restore ccache data"
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-data-${{ matrix.variant }}-${{ github.ref_name }}
          restore-keys: ccache-data-${{ matrix.variant }}-

      - name: "♻️ Restore clang cache"
        if: inputs.FORCE_UPDATE != 'true'
        uses: actions/cache@v4
        with:
          path: ~/clang-cache
          key: clang-greenforce-v1
          restore-keys: clang-greenforce-

      - name: "♻️ Restore kernel source cache"
        if: inputs.FORCE_UPDATE != 'true'
        uses: actions/cache@v4
        with:
          path: ~/kernel-cache
          key: kernel-source-${{ github.ref_name }}-v1
          restore-keys: kernel-source-${{ github.ref_name }}-

      - name: "♻️ Restore AnyKernel3 cache"
        if: inputs.FORCE_UPDATE != 'true'
        uses: actions/cache@v4
        with:
          path: ~/ak3-cache
          key: ak3-veilak3-v1
          restore-keys: ak3-veilak3-

      - name: "♻️ Restore apt cache"
        uses: actions/cache@v4
        with:
          path: ~/.apt-cache
          key: apt-deps-ubuntu-24

      - name: "📦 Install Dependencies"
        run: |
          if [ -d ~/.apt-cache ]; then
            sudo cp -rn ~/.apt-cache/. /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev libelf-dev \
            dwarves cpio git curl wget zip patch
          mkdir -p ~/.apt-cache
          sudo cp /var/cache/apt/archives/*.deb ~/.apt-cache/ 2>/dev/null || true

      - name: "🔨 Build [${{ matrix.variant }}]"
        env:
          GIT_CLONE_PROTECTION_ACTIVE: false
          USE_CLANG_CACHE:  ${{ inputs.FORCE_UPDATE != 'true' }}
          USE_KERNEL_CACHE: ${{ inputs.FORCE_UPDATE != 'true' }}
          USE_AK3_CACHE:    ${{ inputs.FORCE_UPDATE != 'true' }}
        run: bash build.sh

      - name: "📊 Ccache stats"
        if: always()
        run: |
          [ -f "${GITHUB_WORKSPACE}/ccache-bin/ccache" ] && \
            ${GITHUB_WORKSPACE}/ccache-bin/ccache --show-stats || true
